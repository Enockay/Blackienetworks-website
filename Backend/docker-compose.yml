version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blackie-notify
    restart: unless-stopped

    # Expose backend HTTP/WebSocket port
    ports:
      - "3002:3002"

    # Load all environment variables from .env in this directory
    env_file:
      - .env

    # Allow WireGuard to create network interfaces inside the container
    privileged: true
    # If you prefer a narrower permission instead of privileged, you can use:
    # cap_add:
    #   - NET_ADMIN

    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge
